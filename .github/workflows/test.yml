name: Run Tests

on:
  workflow_call:
    inputs:
      node_version:
        required: true
        type: number
        default: 22

jobs:
  test-unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          node_version: ${{ inputs.node_version }}
          pnpm_version: 9
          cache: pnpm

      - name: Build module
        run: pnpm prepack

      - name: Prepare playground
        run: pnpm --filter ./packages/nuxt/playground exec nuxi prepare

      - name: Run unit tests
        run: pnpm exec vitest run --project unit --project nuxt --coverage

      - name: Upload HTML report
        if: ${{ !cancelled() && inputs.node_version == 24 }}
        uses: actions/upload-artifact@v7
        with:
          name: test-coverage-${{ inputs.node_version }}
          path: packages/nuxt/test/coverage
          retention-days: 30

  test-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          node_version: ${{ inputs.node_version }}
          pnpm_version: 9
          cache: pnpm

      - name: Build module
        run: pnpm prepack

      - name: Prepare playground
        run: pnpm --filter ./packages/nuxt/playground exec nuxi prepare

      - name: Prepare runtime-showcase
        run: pnpm --filter ./examples/runtime-showcase exec nuxi prepare

      - name: Install Playwright browsers
        run: pnpm exec playwright-core install --with-deps

      - name: Run e2e tests
        run: pnpm exec vitest run --project e2e

      - name: Upload Screenshot
        if: ${{ !cancelled() && inputs.node_version == 24 }}
        uses: actions/upload-artifact@v7
        with:
          name: screenshot-${{ inputs.node_version }}
          path: packages/nuxt/test/e2e/screenshots/screenshot.jpeg
          retention-days: 30
